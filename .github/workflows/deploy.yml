name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bunx next build --webpack
        env:
          SHARED_PASSWORD: placeholder
          JWT_SECRET: placeholder-jwt-secret-32-chars!!
          GOOGLE_SERVICE_ACCOUNT_EMAIL: placeholder
          GOOGLE_PRIVATE_KEY: placeholder
          GOOGLE_ADMIN_EMAIL: placeholder
          GOOGLE_DRIVE_ROOT_FOLDER_ID: placeholder
          ANTHROPIC_API_KEY: placeholder
          AWS_REGION: ap-northeast-1
          AWS_ACCESS_KEY_ID: placeholder
          AWS_SECRET_ACCESS_KEY: placeholder
          S3_BUCKET_NAME: placeholder

      - name: Upload to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".next/,package.json,bun.lock,node_modules/"
          target: /home/ubuntu/meeting
          overwrite: true

      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/meeting
            git pull origin main
            sudo systemctl restart meeting
