name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/meeting

            # Pull latest code
            git pull origin main

            # Install dependencies
            ~/.bun/bin/bun install

            # Build
            ~/.bun/bin/bunx next build --webpack

            # Restart
            pm2 restart meeting
